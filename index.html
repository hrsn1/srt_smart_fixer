<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 자막 변환기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .box { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .slider-container { margin: 25px 0; background-color: #f8f9fa; padding: 15px 15px 40px 15px; border-radius: 8px; }
        
        /* 슬라이더 마커용 스타일 */
        .slider-wrapper { position: relative; width: 85%; margin: 0 auto; }
        .marker { position: absolute; top: 25px; transform: translateX(-50%); text-align: center; font-size: 0.85em; font-weight: bold; line-height: 1.2; }
        .marker-short { left: 28%; color: #e84118; } /* 12자 위치: (12-5)/25 * 100 */
        .marker-long { left: 76%; color: #0097e6; } /* 24자 위치: (24-5)/25 * 100 */
    </style>
</head>
<body>
    <h2>🎬 스마트 자막 변환기</h2>
    <p>1. 문맥에 맞게 긴 자막을 자동으로 나눕니다.<br>
       2. 자막 간의 타임코드를 빈틈없이 연결합니다.<br>
       3. 자막 끝에 있는 마침표(.)를 깔끔하게 제거합니다.</p>
    
    <div class="box">
        <div class="slider-container">
            <label for="lengthSlider"><b>자막 분할 기준:</b> <span id="lengthValue" style="color:#007BFF; font-weight:bold; font-size:1.2em;">24</span>자</label><br>
            
            <div class="slider-wrapper">
                <input type="range" id="lengthSlider" min="5" max="30" value="24" style="width: 100%; margin-top: 10px; cursor: pointer;">
                
                <div class="marker marker-short">
                    ▲<br>숏폼 추천<br><span style="font-size: 0.8em; font-weight: normal;">(12자)</span>
                </div>
                <div class="marker marker-long">
                    ▲<br>롱폼 추천<br><span style="font-size: 0.8em; font-weight: normal;">(24자)</span>
                </div>
            </div>
            
            <div style="margin-top: 45px; font-size: 0.85em; color: #666; text-align: left;">
                * 설정한 기준 글자 수를 바탕으로, 문맥이 끊기지 않는 곳에서 유연하게 잘립니다.
            </div>
        </div>

        <input type="file" id="fileInput" accept=".srt">
        <br><br>
        <button id="processBtn" disabled>자막 변환하기</button>
    </div>

    <script src="srtFixer.js"></script>
</body>
</html>
